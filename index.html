
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Webfleet Training Library</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
margin-bottom:20px;
}

#search{
width:100%;
padding:12px;
margin-bottom:30px;
font-size:16px;
border-radius:6px;
border:none;
}

.section{
margin-top:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:#111827;
padding:15px;
border-radius:10px;
}

iframe{
border-radius:8px;
}

</style>

<script>

function searchVideos(){

let input = document.getElementById("search").value.toLowerCase()
let cards = document.querySelectorAll(".card")

cards.forEach(card => {

let title = card.innerText.toLowerCase()

if(title.includes(input))
card.style.display="block"
else
card.style.display="none"

})

}

</script>

</head>

<body>

<h1>Webfleet Training Library</h1>

<input id="search" onkeyup="searchVideos()" placeholder="Search training videos...">

<div class="section">
<h2>Overview</h2>

<div class="grid">

<div class="card">
<h3>Webfleet Overview</h3>
<iframe src="https://drive.google.com/file/d/VIDEOID1/preview"
width="100%" height="220"></iframe>
</div>

<div class="card">
<h3>The Dashboard</h3>
<iframe src="https://drive.google.com/file/d/VIDEOID2/preview"
width="100%" height="220"></iframe>
</div>

</div>
</div>


<div class="section">
<h2>Tracking & Fleet Management</h2>

<div class="grid">

<div class="card">
<h3>Vehicle Tracking</h3>
<iframe src="https://drive.google.com/file/d/VIDEOID3/preview"
width="100%" height="220"></iframe>
</div>

<div class="card">
<h3>Asset Tracking</h3>
<iframe src="https://drive.google.com/file/d/VIDEOID4/preview"
width="100%" height="220"></iframe>
</div>

</div>
</div>


<div class="section">
<h2>Reporting</h2>

<div class="grid">

<div class="card">
<h3>Advanced Reporting</h3>
<iframe src="https://drive.google.com/file/d/VIDEOID5/preview"
width="100%" height="220"></iframe>
</div>

<div class="card">
<h3>CO2 Emissions Reporting</h3>
<iframe src="https://drive.google.com/file/d/VIDEOID6/preview"
width="100%" height="220"></iframe>
</div>

</div>
</div>

</body>

</html>
